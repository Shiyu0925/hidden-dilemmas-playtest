// ============================================================================
// AI BACKEND CONFIGURATION
// ============================================================================
const AI_API_BASE = '';

async function callAIEndpoint(path, payload) {
  const res = await fetch(`${AI_API_BASE}${path}`, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify(payload)
  });

  if (!res.ok) {
    throw new Error(`API ${res.status}: ${await res.text().catch(() => '')}`);
  }

  return res.json();
}

function getAvatarColor(ind) { return AVATAR_COLORS[ind] || '#667eea'; }

// Robustly extract JSON from Claude responses — handles markdown code fences and extra text
function parseClaudeJSON(text) {
  // Strip markdown code fences if present
  let clean = text.trim();
  if (clean.includes('```')) {
    clean = clean.replace(/```(?:json)?\n?/g, '').replace(/```/g, '').trim();
  }
  // Find the first { ... } block if there's surrounding text
  const start = clean.indexOf('{');
  const end   = clean.lastIndexOf('}');
  if (start !== -1 && end !== -1) clean = clean.slice(start, end + 1);
  return JSON.parse(clean);
}

function getArchetypeTitle(occ, wfh) {
  const map = ARCHETYPE_TITLES[occ];
  if (!map) return 'Adventurer';
  const wfhKey = wfh === 'full_wfh' ? 'full_wfh' : wfh === 'full_office' ? 'full_office' : 'hybrid';
  return map[wfhKey] || map.default || 'Adventurer';
}

function getWeekPattern(goodChoiceCount) {
  if (goodChoiceCount >= 3) return 'MOSTLY_GOOD';
  if (goodChoiceCount <= 1) return 'MOSTLY_BAD';
  return 'MIXED';
}

function getPartnerStatus(partnerWfh) {
  if (!partnerWfh || partnerWfh === 'na' || partnerWfh === 'not_working') return 'at home full-time (not in paid work)';
  if (partnerWfh.includes('full_wfh')) return 'works from home full-time';
  if (partnerWfh.includes('hybrid')) return 'works hybrid (part office, part home)';
  if (partnerWfh.includes('full_office') || partnerWfh.includes('mostly_office')) return 'works outside the home, commutes to an office';
  if (partnerWfh === 'part_time') return 'works part-time';
  return 'works';
}

function getContextRules(weekPattern, scenarioType) {
  const rules = {

// ============================================================================

class Game {
  constructor() {
    this.root = document.getElementById('game-root');
    this.profileId = null;
    this.sessionId = null;
    this.sceneShownAt = null;
    this.sceneMetersBefore = null;
    this.currentEndingId = null;
    this.surveyStartedAt = Date.now();
    this.showTitleScreen();
  }

  async postJSON(path, payload, opts = {}) {
    try {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(payload),
        keepalive: opts.keepalive === true
      });
      if (!res.ok) throw new Error(`POST ${path} failed: ${res.status}`);
      return await res.json().catch(() => ({}));
    } catch (err) {
      console.warn(`Telemetry error for ${path}:`, err.message);
      return null;
    }
  }

  async saveProfileRecord() {
    if (!this.surveyData) return null;
    const payload = {
      survey: this.surveyData,
      setup: {
        playerName: this.playerName,
        partnerName: this.partnerName,
        partnerCommute: this.partnerCommute,
        playerJob: this.surveyJobLabel || '',
        wfhArrangement: this.wfhArrangement || '',
        buildVersion: GAME_CONFIG.version
      },
      surveyDurationMs: Date.now() - (this.surveyStartedAt || Date.now())
    };
    const data = await this.postJSON('/api/profile', payload);
    if (data?.profile_id) this.profileId = data.profile_id;
    return data;
  }

  async startSessionRecord() {
    const payload = {
      profileId: this.profileId,
      scenarioType: this.scenarioType,
      buildVersion: GAME_CONFIG.version,
      storyState: this.storyState || null
    };
    const data = await this.postJSON('/api/session-start', payload);
    if (data?.session_id) this.sessionId = data.session_id;
    return data;
  }

  async logSceneEvent(sceneId, choiceId, responseTimeMs, metersBefore, metersAfter) {
    if (!this.sessionId) return null;
    return this.postJSON('/api/scene-event', {
      sessionId: this.sessionId,
      scenarioType: this.scenarioType,
      sceneId,
      choiceId,
      responseTimeMs,
      sceneShownAt: this.sceneShownAt,
      choiceSubmittedAt: new Date().toISOString(),
      metersBefore,
      metersAfter,
      storyState: this.storyState || null
    });
  }

  async completeSessionRecord(ending) {
    if (!this.sessionId) return null;
    return this.postJSON('/api/session-end', {
      sessionId: this.sessionId,
      endingId: ending?.id || this.currentEndingId || null,
      endingTitle: ending?.title || null,
      failed: this.failed,
      finalMeters: this.meters,
      storyState: this.storyState || null,
      choices: this.choices || [],
      meterHistory: this.meterHistory || []
    }, { keepalive: true });
  }

  async savePostSurveyRecord() {
    if (!this.sessionId || !this.postSurveyData) return null;
    return this.postJSON('/api/post-survey', {
      sessionId: this.sessionId,
      postSurvey: this.postSurveyData
    }, { keepalive: true });
  }

  isNoChildrenProfile() {
    return isNoChildrenSelection(this.surveyData?.children);
  }

  hasCurrentChildrenProfile() {
    return ['yes_young', 'yes_school', 'yes_teen'].includes(this.surveyData?.children);
  }

  getAdjustedScenarioDef(scenarioId) {
    const def = SCENARIO_DEFS[scenarioId];
    if (!def) return def;
    if (scenarioId === 'family_planning') {
      const hasChildren = this.hasCurrentChildrenProfile();
      const familyDesc = this.surveyData?.children === 'expecting'
        ? "A baby is already on the way. This week tests whether getting ready still feels shared."
        : hasChildren
          ? "You both want another child. This week tests whether that still feels realistic."
          : "You both want a child. This week tests whether that still feels realistic.";
      const familyGoal = this.surveyData?.children === 'expecting'
        ? "Get to the end of the week with the baby feeling like something you are both getting ready for."
        : hasChildren
          ? "See whether having another child still feels realistic by the end of the week."
          : "See whether having a child still feels realistic by the end of the week.";
      return {
        ...def,
        description: familyDesc,
        goal: familyGoal
      };
    }
    if (scenarioId === 'mental_health' && this.isNoChildrenProfile()) {
      return {
        ...def,
        goal: "Get the work done without burning yourself or your relationship out.",
        description: "⚠️ This scenario has an interconnection mechanic: when your wellbeing drops, your partner's drops too. When both of you are running on empty, the whole household atmosphere changes. The goal is sustainable balance — not perfect, just sustainable.",
        meters: def.meters.map(m => m.id === 'child_wellbeing'
          ? { ...m, name: "Household atmosphere" }
          : m
        ),
        failConditions: def.failConditions.map(c => c.meter === 'child_wellbeing'
          ? { ...c, message: "Household atmosphere drops below 30% — the stress is everywhere now. It's showing." }
          : c
        ),
        winCondition: { ...def.winCondition, message: "Sustainable balance. Not perfect — but both of you, and the house around you, are okay." }
      };
    }
    return def;
  }
  
  replaceVars(text) {
    if (!text) return '';
    const employeeName = this.employeeName || this.partnerName || 'Alex';
    const futurePhrase = {
      first_child:'whether your life right now could really hold a child',
      another_child:'whether your life right now could really hold another baby',
      trying_now:'whether you are actually making room for this',
      expecting:'whether life will feel shared once the baby is here',
      unsure:'what the next version of life might realistically ask of you both',
      unspecified:'what the next version of life might realistically ask of you both'
    }[this.storyState?.familyContext || 'unspecified'];
    const familyAppointment = {
      first_child:'a fertility clinic appointment',
      another_child:'an appointment about trying for another baby',
      trying_now:'a fertility follow-up appointment',
      expecting:'an antenatal appointment',
      unsure:'an appointment you said you would go together',
      unspecified:'an appointment you said you would gotogether'
    }[this.storyState?.familyContext || 'unspecified'];
    const futureQuestion = {
      first_child:"Everything already feels full in a way that is getting harder to ignore.",
      another_child:"What another baby would do to this version of life is getting harder to ignore.",
      trying_now:"How little room there is for this once the week starts is getting harder to ignore.",
      expecting:"Whether this will still feel shared once the baby is here is getting harder to ignore.",
      unsure:"What the next version of life might ask of you both is getting harder to ignore.",
      unspecified:"What the next version of life might ask of you both is getting harder to ignore."
    }[this.storyState?.familyContext || 'unspecified'];
    const futureSundayPrompt = {
      first_child:"This week has made it hard to ignore what life already feels like at home.",
      another_child:"This week has made it hard to ignore what another baby would ask of this house.",
      trying_now:"This week has made it hard to ignore how little room there is once work gets hold of the day.",
      expecting:"This week has made it hard to ignore whether this already feels shared or whether it is still landing harder on me.",
      unsure:"This week has made it hard to ignore what kind of life you are actually building day to day.",
      unspecified:"This week has made it hard to ignore what kind of life you are actually building day to day."
    }[this.storyState?.familyContext || 'unspecified'];
    let result = text
      .replace(/{playerName}/g, this.playerName || 'You')
      .replace(/{employeeName}/g, employeeName)
      .replace(/{futurePhrase}/g, futurePhrase)
      .replace(/{familyAppointment}/g, familyAppointment)
      .replace(/{futureQuestion}/g, futureQuestion)
      .replace(/{futureSundayPrompt}/g, futureSundayPrompt)
      .replace(/{partnerName}/g, this.scenarioType === 'employer' ? employeeName : (this.partnerName || 'Your partner'));
    // Replace meter value placeholders like {alignment}, {her_stress}, etc.
    if (this.meters) {
      result = result.replace(/\{(\w+)\}/g, (match, key) => {
        if (this.meters[key] !== undefined) return `<strong>${this.meters[key]}%</strong>`;
        return match;
      });
    }
    
    // Father-centred scenarios are currently scoped to a she/her partner.
    const pp = 'she';
    if (pp !== 'she') {
      const cfg = pp === 'he'
        ? { Sub:'He',   sub:'he',   Obj:'Him',  obj:'him',  Poss:'His',   poss:'his',   refl:'himself'    }
        : { Sub:'They', sub:'they', Obj:'Them', obj:'them', Poss:'Their', poss:'their', refl:'themselves' };
      // Past participles that follow "She's" meaning "She has" → "They've"
      const hasPP = /\b(stopped|started|done|left|tried|heard|handled|used|gone|kept|told|decided|noticed|pulled|withdrawn)\b/;
      result = result
        // "She's been ..." → "They've been ..." / "He's been ..."
        .replace(/\bShe's been\b/g, cfg.Sub+"'ve been").replace(/\bshe's been\b/g, cfg.sub+"'ve been")
        // "She's [past-participle]" = "She has" → "They've" / "He's"
        .replace(/\bShe's (?=[a-z])/g, (m, offset, str) => {
          const next = str.slice(offset + m.length);
          return hasPP.test(next) && pp === 'they' ? "They've " : cfg.Sub+"'s ";
        })
        .replace(/\bshe's (?=[a-z])/g, (m, offset, str) => {
          const next = str.slice(offset + m.length);
          return hasPP.test(next) && pp === 'they' ? "they've " : cfg.sub+(pp==='they'?"'re ":"'s ");
        })
        // Subject
        .replace(/\bShe\b/g, cfg.Sub).replace(/\bshe\b/g, cfg.sub)
        // Possessive her (before noun — most common usage in this text)
        .replace(/\bHer\b/g, cfg.Poss).replace(/\bher\b/g, cfg.poss)
        // Reflexive
        .replace(/\bHerself\b/g, cfg.refl[0].toUpperCase()+cfg.refl.slice(1))
        .replace(/\bherself\b/g, cfg.refl);
    }

    // Handle commute context
    if (result.includes('{partnerCommute}')) {
      const commute = {
        long: "45 minutes",
        medium: "30 minutes", 
        short: "just upstairs"
      }[this.partnerCommute] || "far";
      result = result.replace(/{partnerCommute}/g, commute);
    }
    return result;
  }

  getScenarioOutlook() {
    const avg = values => values.reduce((sum, value) => sum + value, 0) / values.length;
    const clamp = value => Math.max(0, Math.min(100, value));
    let score = 50;

    if (this.scenarioType === 'family_planning') {
      score = avg([
        this.meters.relationship ?? 50,
        100 - (this.meters.her_stress ?? 50),
        this.meters.alignment ?? 50,
        this.meters.career ?? 50
      ]);
    } else if (this.scenarioType === 'mental_health') {
      score = avg([
        this.meters.his_wellbeing ?? 50,
        this.meters.her_wellbeing ?? 50,
        this.meters.child_wellbeing ?? 50,
        this.meters.family_time ?? 50
      ]);
    } else if (this.scenarioType === 'domestic_labour') {
      const perceptionGap = 100 - Math.abs((this.meters.his_perception ?? 50) - (this.meters.her_perception ?? 50));
      score = avg([
        clamp(perceptionGap),
        this.meters.her_perception ?? 50,
        this.meters.actual_split ?? 50,
        this.meters.mental_load ?? 50
      ]);
    } else if (this.scenarioType === 'employer') {
      score = avg([
        this.meters.retention ?? 50,
        this.meters.team_perception ?? 50,
        this.meters.productivity ?? 50,
        this.meters.culture_signal ?? 50
      ]);
    }

    const states = {
      family_planning: [
        { label: "feels far off", note: "Too much is pulling against this right now.", tone: "danger" },
        { label: "fragile", note: "Still in play, but it would not take much to knock it off course.", tone: "warning" },
        { label: "still possible", note: "You are not losing ground, but this still needs care from both of you.", tone: "steady" },
        { label: "more realistic", note: "This week is helping it feel more doable, not just more discussed.", tone: "good" }
      ],
      mental_health: [
        { label: "running too hot", note: "The strain is spreading through the house now.", tone: "danger" },
        { label: "stretched thin", note: "You are getting through it, but not comfortably.", tone: "warning" },
        { label: "holding", note: "There is still pressure, but it has not taken over the week.", tone: "steady" },
        { label: "steady enough", note: "The week still has some room to breathe.", tone: "good" }
      ],
      domestic_labour: [
        { label: "landing on her", note: "Home is still defaulting back onto her by the end of the day.", tone: "danger" },
        { label: "only partly shifting", note: "Some things are moving, but too much is still finding its way back to her.", tone: "warning" },
        { label: "more shared", note: "The week looks more balanced than it did at the start.", tone: "steady" },
        { label: "clearly shifting", note: "Being at home is changing who is actually carrying the week.", tone: "good" }
      ],
      employer: [
        { label: "wobbling", note: "Too much strain is building under the arrangement.", tone: "danger" },
        { label: "fragile", note: "It still works, but it would be hard to defend if pushed.", tone: "warning" },
        { label: "holding", note: "The arrangement is working well enough to stay credible.", tone: "steady" },
        { label: "working well", note: "The arrangement is helping rather than creating drag.", tone: "good" }
      ]
    };

    const stage = score < 35 ? 0 : score < 52 ? 1 : score < 70 ? 2 : 3;
    const state = (states[this.scenarioType] || states.family_planning)[stage];
    return {
      ...state,
      score: Math.round(score),
      activeCount: stage + 1
    };
  }

  async generateAvatarTitle() {
    const d = this.surveyData;

    const attStigma = d.att_stigma ? `${d.att_stigma}/5 on WFH stigma felt at work` : 'no opinion given';
    const attHours  = d.att_hours  ? `${d.att_hours}/5 on long-hours culture` : 'no opinion given';
    const prompt = `You're naming a character in a game about working dads' hidden dilemmas. Make it catchy — like a tweet or a film tagline, not an academic description.

Role: ${this.surveyJobLabel || 'working parent'}, WFH: ${this.wfhArrangement}, family: ${d.children || 'unspecified'}
Attitudes (1–5): equal parenting ${attFather}, WFH stigma felt ${attStigma}, long-hours culture ${attHours}

Generate:
1. Title: 2–4 words, punchy and specific — something a player would want to show their friends. Examples: "The 4:30 Dad", "The Sunday Night Worrier", "The Almost-Present Father", "The Last One Out"
2. Tagline: One sharp observation, 8–10 words MAX. Like a witty character bio. Examples: "Available for calls. Rarely available for pickup." or "Works from home. But is he really home?"

Return ONLY valid JSON: {"title":"...","desc":"..."}`;

    try {
      const data = await callAIEndpoint('/api/avatar-title', { prompt, max_tokens: 80 });
      const rawText = data.text || '';
      console.log('Avatar AI raw:', rawText);
      const parsed = parseClaudeJSON(rawText);
      // Update profile card if still visible
      const titleEl = document.getElementById('ai-char-title');
      const descEl  = document.getElementById('ai-char-desc');
      if (titleEl) { titleEl.textContent = parsed.title; titleEl.setAttribute('data-ready','1'); }
      if (descEl)  descEl.textContent  = parsed.desc;
      // Store for later use
      this.avatarTitle = parsed.title;
      this.avatarDesc  = parsed.desc;
    } catch(e) {
      console.warn('Avatar generation failed:', e.message);
    }
  }

  async startScenario() {
    this.playerJob = this.surveyJobLabel || "";
    if (this.scenarioType === 'employer') {
      const pool = EMPLOYEE_NAMES.filter(n => n.toLowerCase() !== (this.partnerName || '').toLowerCase());
      this.employeeName = pool[Math.floor(Math.random() * pool.length)];
    } else {
      this.employeeName = null;
    }
    this.sceneCache = {};

    // storyState drives branching narrative and AI tone
    this.storyState = {
      // Employer branching
      employeeHasWFH: false,
      wfhIsPublic: false,
      isTrial: false,
      // Universal
      choicePattern: [],
      goodChoiceCount: 0,  // legacy (domestic/mental health)
      // Family planning state
      familyWindowOpen: false,
      familyWindowMode: 'work_first',   // 'work_first' | 'family_first' | 'both'
      connectionScore: 0,
      avoidanceScore: 0,
      repairScore: 0,
      involvementScore: 0,
      reliabilityScore: 0,
      workIntrusionScore: 0,
      weekPattern: 'START',        // 'DISCONNECTED' | 'CAUTIOUS' | 'CONNECTED'
      // Mental-health state
      mentalBoundaryScore: 0,
      mentalWorkSpillScore: 0,
      mentalCompromiseScore: 0,
      // Family context (derived from survey children field)
      familyContext: (() => {
        const c = this.surveyData?.children || '';
        if (['yes_young','yes_school','yes_teen'].includes(c)) return 'another_child';
        if (c === 'expecting') return 'expecting';
        if (c === 'no_want') return 'first_child';
        if (c === 'no_unsure') return 'unsure';
        return 'unspecified';
      })(),
      partnerEmployment: (() => {
        const pw = this.surveyData?.partnerWfh || '';
        return (pw === 'na' || pw === 'not_working') ? 'not_employed' : 'working';
      })(),
    };

    // Initialize meters
    this.meters = {};
    this.scenarioDef.meters.forEach(m => {
      this.meters[m.id] = m.initial;
    });

    this.scenarios = SCENARIOS[this.scenarioType];
    this.currentIndex = 0;
    this.choices = [];
    this.meterHistory = [];
    this.failed = false;
    this.failMessage = null;
    this.currentEndingId = null;

    await this.startSessionRecord();
    this.showScene();
  }

  preAdaptScene(scene) {
    // Programmatic logic fixes — always run, no AI needed
    let { sceneText, context } = scene;
    const pw   = this.surveyData?.partnerWfh || '';
    const pp   = 'she';
    const isPartnerRemote = pw.includes('full_wfh') || this.partnerCommute === 'none';
    const isPartnerHome   = pw === 'na' || pw === 'not_working';

    // Build pronoun-correct replacement fragments
    const pSub  = pp === 'he' ? 'he'   : pp === 'they' ? 'they'   : 'she';
    const pPoss = pp === 'he' ? 'his'  : pp === 'they' ? 'their'  : 'her';
    const pObj  = pp === 'he' ? 'him'  : pp === 'they' ? 'them'   : 'her';
    const pHave = pp === 'he' ? "he's" : pp === 'they' ? "they've" : "she's";

    if (isPartnerRemote || isPartnerHome) {
      // "just walked in after her commute" — replace with correct pronoun form
      const remoteArrival = isPartnerHome
        ? (this.hasCurrentChildrenProfile()
            ? `comes in from the other room — ${pHave} been with the kids all day`
            : `comes in from the other room`)
        : `comes over from ${pPoss} desk downstairs`;
      sceneText = sceneText.replace(/just walked in after (?:her|their|his) commute/gi, remoteArrival);
      sceneText = sceneText.replace(/walks in after (?:her|their|his) commute/gi, remoteArrival);
      sceneText = sceneText.replace(/after (?:her|their|his) commute[.,]/gi, m => m.slice(-1));

      // Fix context references to partner's location
      // When partner is home + child under 5: use "childcare handover" framing, not pickup
      const children = this.surveyData?.children || '';
      const hasYoungChild = children === 'yes_young';
      const wfhContext = isPartnerHome
        ? hasYoungChild
          ? `{partnerName} has been managing childcare and work all day — you were supposed to take over at 4pm.`
          : `{partnerName} is home — but ${pSub} has ${pPoss} own things to manage today.`
        : hasYoungChild
          ? `{partnerName} has been WFH all day, but your child has been at nursery until 4pm.`
          : `{partnerName} is working from home — ${pSub} has back-to-back calls today.`;
      const cantLeave = isPartnerHome
        ? `${pSub}'s already been managing childcare all day and can't take more right now.`
        : `But ${pSub}'s mid-meeting and it would mean dropping everything.`;

      context = context
        .replace(/\{partnerName\} is \{partnerCommute\} away[^.]*\. (?:She|They|He) can't easily leave\./gi, wfhContext)
        .replace(/\{partnerName\} is \{partnerCommute\} away[^.]*\./gi, wfhContext)
        .replace(/Even if (?:she|they|he) left now, it would take time\./gi, cantLeave);
    }

    if (isPartnerHome) {
      sceneText = sceneText
        .replace(/comes downstairs after closing (?:her|their|his) laptop/gi, 'comes in from the other room')
        .replace(/after closing (?:her|their|his) laptop/gi, 'after a long day at home')
        .replace(/\b(?:she|he|they) (?:has|have) been working since early this morning and is visibly tired\b/gi, '{partnerName} already looks tired')
        .replace(/\b(?:she|he|they) (?:has|have) been working since early this morning\b/gi, '{partnerName} already looks tired');
      context = context
        .replace(/\b(?:she|he|they) (?:has|have) been working since early this morning\b/gi, '{partnerName} has already had a long day at home');
    }

    return { ...scene, sceneText, context };
  }

  getMentalPattern() {
    const s = this.storyState || {};
    const boundary = s.mentalBoundaryScore || 0;
    const spill = s.mentalWorkSpillScore || 0;
    const compromise = s.mentalCompromiseScore || 0;
    if (boundary === 0 && spill === 0 && compromise === 0) return 'START';
    if (boundary >= spill + 1 && boundary >= compromise + 1) return 'BOUNDARY';
    if (spill >= boundary + 2 && spill >= compromise) return 'SPILLOVER';
    if (compromise >= 2 && compromise >= boundary && compromise >= spill) return 'COMPROMISE';
    return 'MIXED';
  }

  getMentalWeekPattern() {
    const pattern = this.getMentalPattern();
    if (pattern === 'BOUNDARY') return 'MOSTLY_GOOD';
    if (pattern === 'SPILLOVER') return 'MOSTLY_BAD';
    return 'MIXED';
  }

  async personalizeScene(scene) {
    const d = this.surveyData || {};
    const patternKey = this.storyState?.choicePattern?.join('') || '';
    const jobKey = this.surveyJobLabel || 'generic';
    const cacheKey = `${scene.id}_${jobKey}_${d.partnerWfh || ''}_${patternKey}`;
    if (this.sceneCache[cacheKey]) return this.sceneCache[cacheKey];

    let contextStr = scene.context;
    if (typeof contextStr === 'object') {
      contextStr = contextStr[this.partnerCommute] || contextStr.long || '';
    }

    try {
      const data = await callAIEndpoint('/api/personalize-scene', {
        prompt: this.buildAIPrompt(scene, contextStr),
        max_tokens: 400
      });
      const rawText = data.text || '';
      console.log('AI raw:', rawText);
      const parsed = parseClaudeJSON(rawText);
      // guide uses "scene" key; also accept "sceneText" for backwards compat
      const personalized = this.preAdaptScene({
        ...scene,
        sceneText: parsed.scene || parsed.sceneText || scene.sceneText,
        context:   parsed.context || scene.context,
        _aiAdapted: true
      });
      if (this.scenarioType === 'family_planning' && scene.id === 'fp_1') {
        if (/(daughter|son|child).{0,30}appointment/i.test(personalized.sceneText) || /left for (?:her|their|his) office/i.test(personalized.sceneText)) {
          personalized.sceneText = scene.sceneText;
          personalized.context = scene.context;
        }
      }
      personalized._aiAdapted = true;
      this.sceneCache[cacheKey] = personalized;
      return personalized;
    } catch (e) {
      console.warn('AI failed:', e.message, '— programmatic fallback');
      const fallback = this.preAdaptScene(scene);
      fallback._aiAdapted = false;
      return fallback;
    }
  }

  getActiveScene(index) {
    const type = this.scenarioType;

    if (type === 'employer') {
      if (index === 0) return SCENARIOS.employer[0];
      if (index === 1) return this.getEmployerQ2();
      if (index === 2) return this.storyState.employeeHasWFH ? SCENARIOS.employer[2] : EMPLOYER_BRANCH.q3_no_wfh;
      if (index === 3) return this.storyState.employeeHasWFH ? SCENARIOS.employer[3] : EMPLOYER_BRANCH.q4_no_wfh;
    }

    if (type === 'domestic_labour') {
      if (index === 0) return this.getDomesticQ1();
      if (index === 1) return this.getDomesticQ2();
      if (index === 2) return this.getDomesticQ3();
      if (index === 3) return this.getDomesticQ4();
    }

    if (type === 'family_planning') {
      if (index === 0) return SCENARIOS.family_planning[0]; // new Q1 always
      if (index === 1) return this.getFamilyQ2();
      if (index === 2) return this.getFamilyQ3();
      if (index === 3) return this.getFamilyQ4();
    }

    if (type === 'mental_health') {
      if (index === 0) return this.getMentalQ1();
      if (index === 1) return this.getMentalQ2();
      if (index === 2) return this.getMentalQ3();
      if (index === 3) return this.getMentalQ4();

  updateStoryState(sceneId, choiceId, choice) {
    // Employer branching: track whether employee has WFH
    if (this.scenarioType === 'employer') {
      if (sceneId === 'emp_1') {
        if (choiceId === 'B') { this.storyState.employeeHasWFH = true; }
        else if (choiceId === 'C') { this.storyState.employeeHasWFH = true; this.storyState.isTrial = true; }
      }
      if (sceneId === 'emp_2_pending') {
        if (choiceId === 'A') this.storyState.employeeHasWFH = true;
        else if (choiceId === 'C') { this.storyState.employeeHasWFH = true; this.storyState.isTrial = true; }
      }
    }

    // Family planning: read storySignal from choice + track how Monday set the week up
    if (this.scenarioType === 'family_planning' && choice?.storySignal) {
      const s = choice.storySignal;
      this.storyState.connectionScore    += s.connection    || 0;
      this.storyState.avoidanceScore     += s.avoidance     || 0;
      this.storyState.repairScore        += s.repair        || 0;
      this.storyState.involvementScore   += s.involvement   || 0;
      this.storyState.reliabilityScore   += s.reliability   || 0;
      this.storyState.workIntrusionScore += s.workIntrusion || 0;

      if (sceneId === 'fp_1') {
        if (choiceId === 'A') { this.storyState.familyWindowOpen = false; this.storyState.familyWindowMode = 'work_first'; }
        else if (choiceId === 'B') { this.storyState.familyWindowOpen = true;  this.storyState.familyWindowMode = 'family_first'; }
        else if (choiceId === 'C') { this.storyState.familyWindowOpen = true;  this.storyState.familyWindowMode = 'both'; }
      }

      const net = this.getFamilyFeasibility();
      this.storyState.weekPattern = net <= 1 ? 'DISCONNECTED' : net <= 4 ? 'CAUTIOUS' : 'CONNECTED';
    }

    if (this.scenarioType === 'mental_health') {
      if (choiceId === 'A') this.storyState.mentalWorkSpillScore += 2;
      else if (choiceId === 'B') this.storyState.mentalBoundaryScore += 2;
      else if (choiceId === 'C') {
        this.storyState.mentalCompromiseScore += 2;
        this.storyState.mentalWorkSpillScore += 1;
      }
    }

    // Track choice pattern and good choice count for all scenarios
    this.storyState.choicePattern.push(choiceId);
    if (choiceId === 'B' || choiceId === 'C') this.storyState.goodChoiceCount++;
  }

  renderMeters() {
    // Pre-compute fail markers for each meter
    const failMarkers = {};
    for (const cond of this.scenarioDef.failConditions) {
      if (cond.meter) failMarkers[cond.meter] = { threshold: cond.threshold, below: !!cond.below };
    }
    return this.scenarioDef.meters.map(m => {
      const value = Math.max(0, Math.min(100, this.meters[m.id]));
      const fm = failMarkers[m.id];

      // Determine critical state: inverted meter (like stress) is critical when HIGH
      const isCritical = fm
        ? (fm.below ? value <= fm.threshold + 5 : value >= fm.threshold - 5)
        : (m.inverted ? value >= 75 : value <= 25);

      let dangerZone = '';
      let marker = '';
      if (fm) {
        // Danger zone: shaded red area where failure happens
        // "below" = fail if value drops below threshold → danger zone is the LEFT side
        // not "below" = fail if value exceeds threshold → danger zone is the RIGHT side
        const dangerStyle = fm.below
          ? `left:0;width:${fm.threshold}%`
          : `left:${fm.threshold}%;right:0`;
        dangerZone = `<div style="position:absolute;top:0;bottom:0;${dangerStyle};background:rgba(220,53,69,0.18);z-index:1;pointer-events:none;"></div>`;
        // Threshold line: solid red, visible
        marker = `<div style="position:absolute;top:-2px;bottom:-2px;left:calc(${fm.threshold}% - 1.5px);width:3px;background:#dc3545;z-index:3;border-radius:1px;" title="Fail if ${fm.below ? 'below' : 'above'} ${fm.threshold}%"></div>`;
      }

      return `
        <div class="meter-row ${isCritical ? 'meter-critical' : ''}">
          <span class="meter-label">${m.name}</span>
          <div class="meter-bar" style="position:relative;overflow:visible;">
            <div class="meter-fill ${m.color}" style="width: ${value}%;position:relative;z-index:2;"></div>
            ${dangerZone}${marker}
          </div>
          <span class="meter-value" style="color:${isCritical ? '#dc3545' : '#666'};font-weight:${isCritical ? '600' : '500'};">${value}%</span>
        </div>
      `;
    }).join('');
  }
  
  checkFailConditions() {
    for (const cond of this.scenarioDef.failConditions) {
      if (cond.gap) {
        const diff = Math.abs(this.meters[cond.gap[0]] - this.meters[cond.gap[1]]);
        if (diff >= cond.threshold) {
          return cond.message;
        }
      } else if (cond.below) {
        if (this.meters[cond.meter] <= cond.threshold) {
          return cond.message;
        }
      } else {
        if (this.meters[cond.meter] >= cond.threshold) {
          return cond.message;
        }
      }
    }
    return null;
  }

  makeChoice(choiceId) {
    const scene = this.getActiveScene(this.currentIndex);
    const choice = scene.choices.find(c => c.id === choiceId);

    // Update branching story state BEFORE recording (so it's captured in data)
    this.updateStoryState(scene.id, choiceId, choice);

    // Record choice with response time
    const responseTimeMs = Date.now() - (this.sceneStartTime || Date.now());
    this.choices.push({
      scene: scene.id,
      choice: choiceId,
      label: this.replaceVars(choice.main),
      responseTimeMs,
      timestamp: new Date().toISOString(),
      storyState: { ...this.storyState }
    });
    
    const metersBefore = { ...(this.sceneMetersBefore || this.meters) };

    // Apply effects (cap at ±12 per BAL-001)
    const changes = [];
    for (let key in choice.effects) {
      const oldVal = this.meters[key];
      const capped = Math.max(-12, Math.min(12, choice.effects[key]));
      this.meters[key] = Math.max(0, Math.min(100, this.meters[key] + capped));
      const diff = this.meters[key] - oldVal;
      if (diff !== 0) {
        const meterDef = this.scenarioDef.meters.find(m => m.id === key);
        if (meterDef) changes.push({
          name: meterDef.name,
          change: diff > 0 ? `+${diff}` : diff,
          positive: meterDef.inverted ? diff < 0 : diff > 0
        });
      }
    }
    
    // Apply interconnection mechanic for mental health
    if (this.scenarioDef.mechanic === 'interconnection') {
      // If his wellbeing drops, her wellbeing drops slightly
      if (choice.effects.his_wellbeing && choice.effects.his_wellbeing < 0) {
        this.meters.her_wellbeing = Math.max(0, this.meters.her_wellbeing - 5);
      }
      // If her wellbeing drops, child notices
      if (choice.effects.her_wellbeing && choice.effects.her_wellbeing < 0) {
        this.meters.child_wellbeing = Math.max(0, this.meters.child_wellbeing - 3);
      }
      // If family time is low, child wellbeing drops
      if (this.meters.family_time < 30) {
        this.meters.child_wellbeing = Math.max(0, this.meters.child_wellbeing - 5);
      }
    }
    
    // Record meter state after this choice
    this.meterHistory.push({ scene: scene.id, choice: choiceId, ...this.meters, timestamp: new Date().toISOString() });
    this.logSceneEvent(scene.id, choiceId, responseTimeMs, metersBefore, { ...this.meters });

    // Check fail conditions
    const failMsg = this.checkFailConditions();
    
    // Hide choices, show signal
    document.getElementById('choices-container').style.display = 'none';
    
    let signalHtml = `
      <div class="signal-box">
        <p class="signal-text">${this.replaceVars(choice.signal)}</p>
        ${choice.accumulation ? `<p class="accumulation">⚠️ ${this.replaceVars(choice.accumulation)}</p>` : ''}
      </div>
    `;
    
    if (failMsg) {
      signalHtml += `
        <div class="warning-box">
          <p class="warning-title">⚠️ Warning</p>
          <p class="warning-text">${this.replaceVars(failMsg)}</p>
        </div>
      `;
      this.failed = true;
      this.failMessage = failMsg;
    }
    
    signalHtml += `<button class="btn btn-primary" onclick="game.nextScene()">Continue →</button>`;
    
    document.getElementById('signal-container').innerHTML = signalHtml;
  }
  
  nextScene() {
    this.currentIndex++;
    if (this.currentIndex < this.scenarios.length && !this.failed) {
      this.showScene(); // async — fire and forget is fine here
    } else {
      this.showEnding();
    }
  }
  
  async showEnding() {
    const endings = ENDINGS[this.scenarioType];
    let ending = endings.find(e => e.condition(this.meters)) || endings[endings.length - 1];
    if (this.failed) {
      ending = endings.find(e => this.replaceVars(e.desc).includes(this.replaceVars(this.failMessage))) || ending;
    }
    if (this.scenarioType === 'family_planning') {
      ending = this.getFamilyEndingOverride(ending);
    }
    if (this.scenarioType === 'mental_health') {
      ending = this.getMentalEndingOverride(ending);
    }
    this.currentEndingId = ending.id;
    this.completeSessionRecord(ending);

    const animal = getAvatarAnimal(this.surveyData?.occupation);
    const color  = getAvatarColor(this.surveyData?.industry);
    const charTitle = this.avatarTitle || getArchetypeTitle(this.surveyData?.occupation, this.surveyData?.wfh);

    // Win condition thresholds for pass/fail colouring per meter
    const winDef = this.scenarioDef.winCondition;
    const meterCards = this.scenarioDef.meters.map(m => {
      const val = this.meters[m.id];
      const isCritical = m.inverted ? val >= 75 : val <= 25;
      const isGood     = m.inverted ? val < 60  : val >= 50;
      const color2 = isCritical ? '#FF3B30' : isGood ? '#34C759' : '#FF9500';
      const icon   = isCritical ? '✗' : isGood ? '✓' : '~';
      const colorHex = m.color.replace('meter-purple','#6B4C9A').replace('meter-coral','#E57373')
                               .replace('meter-amber','#DAA520').replace('meter-teal','#00A896')
                               .replace('meter-blue','#4A90D9');
      return `
        <div style="background:#f8f8f8;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;">
          <div style="width:32px;height:32px;border-radius:50%;background:${colorHex};display:flex;align-items:center;justify-content:center;color:white;font-size:16px;font-weight:600;flex-shrink:0;">${icon}</div>
          <div style="flex:1;">
            <p style="font-size:12px;color:#888;margin-bottom:2px;">${m.name}</p>
            <div style="height:6px;background:#e9ecef;border-radius:3px;overflow:hidden;">
              <div style="height:100%;width:${val}%;background:${color2};border-radius:3px;transition:width 0.6s;"></div>
            </div>
          </div>
          <span style="font-size:14px;font-weight:600;color:${color2};min-width:36px;text-align:right;">${val}%</span>
        </div>`;
    }).join('');

    this.root.innerHTML = `
      <div class="screen active">

        <div class="card" style="background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:28px 24px;text-align:center;">
          <div style="width:56px;height:56px;border-radius:50%;background:${color};margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:28px;opacity:0.9;">${animal.emoji}</div>
          <p style="color:rgba(255,255,255,0.5);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">${charTitle}</p>
          <p style="color:rgba(255,255,255,0.4);font-size:11px;">Week ${this.scenarios.length} complete</p>
        </div>

        <div class="ending-box ${ending.style}" style="border-radius:0;margin:0;padding:28px 24px;">
          <p class="ending-title" style="font-size:26px;">${ending.title}</p>
          <p class="ending-desc" style="font-size:15px;line-height:1.7;margin-top:10px;">${this.replaceVars(ending.desc)}</p>
        </div>

        <div class="card" style="margin-top:0;border-radius:0 0 12px 12px;">
          ${this.renderOutlookCard("By the end of the week")}
          <p class="label" style="margin-bottom:10px;">How the week played out</p>
          <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;">${meterCards}</div>

          ${ending.insight ? `
            <div style="background:#f0f7ff;border-left:4px solid #007AFF;padding:14px 16px;border-radius:0 8px 8px 0;margin-bottom:20px;">
              <p style="font-size:11px;color:#007AFF;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Research context</p>
              <p style="font-size:13px;color:#444;line-height:1.5;">${ending.insight}</p>
            </div>
          ` : ''}

          <button class="btn btn-primary" onclick="game.startScenario()">↺ Play again — make different choices</button>
          <button class="btn btn-secondary" style="margin-top:8px;" onclick="game.showScenarioSelect()">Try a different scenario</button>
          <button class="btn" style="margin-top:8px;" onclick="game.showPostSurvey()">Reflect on this + view data</button>
        </div>
        </div>
      </div>
    `;
  }
  
  showPostSurvey() {
    const likert5 = (id, text, lo, hi) => `
      <p style="font-size:14px;font-weight:500;margin-bottom:8px;">${text}</p>
      <div style="display:flex;gap:6px;margin-bottom:4px;">
        ${[1,2,3,4,5].map(n => `
          <label style="display:flex;flex-direction:column;align-items:center;gap:3px;font-size:12px;color:#666;flex:1;cursor:pointer;">
            <input type="radio" name="${id}" value="${n}" style="width:auto;margin:0;padding:0;">${n}
          </label>`).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#bbb;margin-bottom:20px;">
        <span>${lo}</span><span>${hi}</span>
      </div>`;

    const irlScale = (id) => `
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;">
        ${['Yes','Probably','Not sure','Probably not','No'].map((lbl, i) => `
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:#555;cursor:pointer;background:#f8f8f8;padding:5px 10px;border-radius:8px;border:1.5px solid #e0e0e0;">
            <input type="radio" name="${id}" value="${lbl}" style="width:auto;margin:0;padding:0;"> ${lbl}
          </label>`).join('')}
      </div>`;

    // Build per-choice IRL questions from actual choices made
    const sceneLabels = {
      fp_1:'Monday appointment', fp_2:'Tuesday evening load', fp_3:'Thursday private time', fp_4:'Friday lunch break',
      fp_2_closed_working:'Tuesday evening load', fp_2_closed_homecare:'Tuesday evening load', fp_2_closed_expecting:'Tuesday evening load', fp_2_open:'Tuesday evening load', fp_2_open_both:'Tuesday evening load',
      fp_3_private_drift:'Thursday private time', fp_3_private_recognition:'Thursday private time',
      fp_4_out_loud_building:'Friday lunch break', fp_4_out_loud_expecting:'Friday lunch break', fp_4_out_loud_parenting:'Friday lunch break',
      mh_1:'Monday evening', mh_2:'Wednesday morning', mh_3:'Thursday office change', mh_3_monitoring:'Thursday work pressure', mh_3_monitoring_no_child:'Thursday work pressure', mh_4:'Friday switch-off',
      dl_1:'Monday break', dl_2:'Tuesday expectations', dl_3:'Workspace question', dl_4:'Friday noticing',
      emp_1:'Initial WFH request', emp_2:'Responsiveness creep', emp_3:'Project staffing', emp_4:'Annual review',
      emp_2_pending:'HR follow-up', emp_3_no_wfh:'Team disengagement', emp_4_no_wfh:'Exit conversation',
      dl_4_good:'Friday noticing', dl_4_mixed:'Friday noticing', dl_4_bad:'Friday noticing',
    };

    const choiceRows = this.choices.map((c, i) => {
      const sceneLabel = sceneLabels[c.scene] || `Scene ${i+1}`;
      const truncated = c.label.length > 60 ? c.label.slice(0,57) + '…' : c.label;
      return `
        <div style="background:#f8f8f8;border-radius:10px;padding:14px;margin-bottom:12px;">
          <p style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;">${sceneLabel}</p>
          <p style="font-size:13px;font-weight:500;margin-bottom:10px;">You chose: "${truncated}"</p>
          <p style="font-size:13px;color:#555;margin-bottom:8px;">In real life, would you make the same choice?</p>
          ${irlScale(`irl_${i}`)}
        </div>`;
    }).join('');

    // Hardest choice options
    const hardestOptions = this.choices.map((c, i) => {
      const sceneLabel = sceneLabels[c.scene] || `Scene ${i+1}`;
      return `<option value="${c.scene}">${sceneLabel}</option>`;
    }).join('');

    // Most realistic moment
    const realisticOptions = this.choices.map((c, i) => {
      const sceneLabel = sceneLabels[c.scene] || `Scene ${i+1}`;
      return `<option value="${c.scene}">${sceneLabel}</option>`;
    }).join('');

    this.root.innerHTML = `
      <div class="screen active">
        <div class="card">
          <h3>One last thing</h3>
          <p class="subtitle" style="margin-bottom:20px;">These questions feed directly into the research. Takes 2–3 minutes.</p>

          ${likert5('post_realism', 'Overall, how realistic did these situations feel?', 'Not realistic at all', 'Completely realistic')}
        </div>

        <div class="card">
          <h3 style="margin-bottom:4px;">Your choices — IRL</h3>
          <p style="font-size:13px;color:#888;margin-bottom:16px;">For each choice you made, would you do the same in real life?</p>
          ${choiceRows}
        </div>

        <div class="card">
          <h3 style="margin-bottom:14px;">Reflection</h3>

          <label class="label">Did you play as yourself or more as a hypothetical person?</label>
          <select id="post_played_as" style="margin-bottom:16px;">
            <option value="">Select...</option>
            <option value="self">Mostly as myself</option>
            <option value="mix">A mix of myself and a hypothetical person</option>
            <option value="hypothetical">Mostly as a hypothetical person</option>
          </select>

          <label class="label">What were you mainly trying to keep hold of?</label>
          <select id="post_main_focus" style="margin-bottom:16px;">
            <option value="">Select...</option>
            ${this.scenarioType === 'employer' ? `
              <option value="employee">Keeping the employee</option>
              <option value="performance">Keeping performance up</option>
              <option value="fairness">Keeping things fair</option>
              <option value="disruption">Avoiding disruption</option>
            ` : this.scenarioType === 'family_planning' ? `
              <option value="career">Your standing at work</option>
              <option value="relationship">Your relationship</option>
              <option value="partner_stress">Your partner's stress</option>
              <option value="shared_effort">How much effort came from both of you</option>
            ` : this.scenarioType === 'domestic_labour' ? `
              <option value="work">Work performance</option>
              <option value="relationship">Your relationship</option>
              <option value="peace">Keeping the peace at home</option>
              <option value="load">Stopping things landing mostly on her</option>
            ` : `
              <option value="work">Work performance</option>
              <option value="energy">Your own energy</option>
              <option value="family_time">Family time</option>
              <option value="peace">Keeping the peace at home</option>
            `}
          </select>

          <label class="label">Which moment felt hardest to choose?</label>
          <select id="post_hardest" style="margin-bottom:16px;">
            <option value="">Select...</option>
            ${hardestOptions}
          </select>

          <label class="label">Which moment felt most true to your real life?</label>
          <select id="post_realistic_moment" style="margin-bottom:16px;">
            <option value="">Select...</option>
            ${realisticOptions}
          </select>

          <label class="label">If you'd choose differently IRL, what would change your choice? (optional)</label>
          <textarea id="post_irl_different" placeholder="e.g. my manager wouldn't be so understanding, we don't have childcare issues..." style="width:100%;padding:12px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;min-height:70px;resize:vertical;margin-bottom:16px;"></textarea>

          <label class="label">What surprised you most about your own choices? (optional)</label>
          <textarea id="post_surprise" placeholder="e.g. I thought I'd always prioritise work, but..." style="width:100%;padding:12px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;min-height:70px;resize:vertical;margin-bottom:20px;"></textarea>

          <button class="btn btn-primary" onclick="game.savePostSurvey()">Submit and see summary →</button>
          <button onclick="game.showData()" style="background:none;border:none;color:#888;font-size:13px;cursor:pointer;margin-top:8px;display:block;width:100%;text-align:center;">Skip → view raw data only</button>
        </div>
      </div>
    `;
  }

  savePostSurvey() {
    // Collect per-choice IRL ratings
    const irlChoices = this.choices.map((c, i) => ({
      sceneId:    c.scene,
      choiceId:   c.choice,
      choiceLabel: c.label,
      irlSame:    document.querySelector(`input[name="irl_${i}"]:checked`)?.value || null,
    }));

    this.postSurveyData = {
      realism:            document.querySelector('input[name="post_realism"]:checked')?.value || null,
      playedAs:           document.getElementById('post_played_as')?.value || null,
      mainFocus:          document.getElementById('post_main_focus')?.value || null,
      hardestChoice:      document.getElementById('post_hardest')?.value || null,
      mostRealisticMoment:document.getElementById('post_realistic_moment')?.value || null,
      irlChoices,
      irlWhatDifferent:   document.getElementById('post_irl_different')?.value?.trim() || null,
      surpriseMoment:     document.getElementById('post_surprise')?.value?.trim() || null,
    };
    this.savePostSurveyRecord();
    this.showReflectionSummary();
  }

  showReflectionSummary() {
    const focusLabels = {
      career: "your standing at work",
      relationship: "your relationship",
      partner_stress: "your partner's stress",
      shared_effort: "how much effort came from both of you",
      work: "work performance",
      energy: "your own energy",
      family_time: "family time",
      peace: "keeping the peace at home",
      load: "stopping things landing mostly on her",
      employee: "keeping the employee",
      performance: "keeping performance up",
      fairness: "keeping things fair",
      disruption: "avoiding disruption"
    };
    const playedAsLabels = {
      self: "Mostly as yourself",
      mix: "A mix of yourself and a hypothetical person",
      hypothetical: "Mostly as a hypothetical person"
    };
    const mainFocus = this.postSurveyData?.mainFocus ? (focusLabels[this.postSurveyData.mainFocus] || this.postSurveyData.mainFocus) : "not stated";
    const playedAs = this.postSurveyData?.playedAs ? (playedAsLabels[this.postSurveyData.playedAs] || this.postSurveyData.playedAs) : "not stated";
    const endingTitle = this.currentEndingId ? (ENDINGS[this.scenarioType].find(e => e.id === this.currentEndingId)?.title || "Week complete") : "Week complete";

    this.root.innerHTML = `
      <div class="screen active">
        <div class="card">
          <h3>Your week, in one view</h3>
          <p class="subtitle" style="margin-bottom:18px;">This is a short summary before you look at any raw data.</p>

          <div style="background:#f8f8f8;border-radius:10px;padding:14px;margin-bottom:12px;">
            <p style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;">Scenario result</p>
            <p style="font-size:16px;font-weight:600;">${endingTitle}</p>
          </div>

          <div style="background:#f8f8f8;border-radius:10px;padding:14px;margin-bottom:12px;">
            <p style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;">You said you played</p>
            <p style="font-size:15px;">${playedAs}</p>
          </div>

          <div style="background:#f8f8f8;border-radius:10px;padding:14px;margin-bottom:18px;">
            <p style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;">You said you were mainly trying to keep hold of</p>
            <p style="font-size:15px;">${mainFocus}</p>
          </div>

          <p style="font-size:13px;color:#666;line-height:1.5;margin-bottom:18px;">The game still judged the week using several hidden dimensions at once, not just one. That is why the final result may not line up neatly with the one thing you were most focused on.</p>

          <button class="btn btn-primary" onclick="game.showData()">View raw data →</button>
          <button class="btn btn-secondary" style="margin-top:8px;" onclick="game.showScenarioSelect()">Back to scenarios</button>
        </div>
      </div>
    `;
  }

  showData() {
    const data = {
      scenario: this.scenarioType,
      survey: this.surveyData || null,
      postSurvey: this.postSurveyData || null,
      setup: {
        playerName: this.playerName,
        partnerName: this.partnerName,
        employeeName: this.employeeName || null,
        partnerCommute: this.partnerCommute,
        playerJob: this.playerJob,
        wfhArrangement: this.wfhArrangement
      },
      choices: this.choices,
      meterHistory: this.meterHistory || [],
      finalMeters: this.meters,
      storyState: this.storyState || null,
      failed: this.failed,
      timestamp: new Date().toISOString()
    };

    const dataJson = JSON.stringify(data, null, 2);

    this.root.innerHTML = `
      <div class="screen active">
        <div class="card">
          <h3>Collected Data</h3>
          <p class="subtitle">In production, this would be sent to a research database automatically.</p>
          <pre style="background: #f5f5f5; padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 12px;">${dataJson}</pre>
          <button class="btn btn-primary" onclick="game.showScenarioSelect()">← Back to scenarios</button>
        </div>
      </div>
    `;
  }
}

// Start the game
const game = new Game();
</script>
