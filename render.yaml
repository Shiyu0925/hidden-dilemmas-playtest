services:
  - type: web
    name: hidden-dilemmas
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001
      - key: DATABASE_URL
        fromDatabase:
          name: hidden-dilemmas-db
          property: connectionString
      - key: ALLOWED_ORIGIN
        sync: false

databases:
  - name: hidden-dilemmas-db
